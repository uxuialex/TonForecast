name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_ref:
        description: Git ref, tag, or commit to deploy
        required: false
        type: string

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          TARGET_REF: ${{ github.event.inputs.target_ref || github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          envs: DEPLOY_PATH,TARGET_REF
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"
            PREV_COMMIT="$(git rev-parse HEAD)"
            PREV_BACKUP_FILE=""
            PREV_BUILD_COMMIT="$PREV_COMMIT"
            PREV_BUILD_REF="$PREV_COMMIT"
            PREV_BUILD_TIME=""

            wait_for_http() {
              local url="$1"
              local attempts="${2:-20}"
              local delay="${3:-3}"

              for _ in $(seq 1 "$attempts"); do
                if curl -fsS "$url" >/dev/null; then
                  return 0
                fi
                sleep "$delay"
              done

              return 1
            }

            cleanup_compose_state() {
              docker compose down --remove-orphans 2>/dev/null || true
              docker rm -f $(docker ps -aq --filter "name=ton-forecast-api") 2>/dev/null || true
              docker rm -f $(docker ps -aq --filter "name=ton-forecast-miniapp") 2>/dev/null || true
            }

            api_exec() {
              docker compose exec -T api "$@"
            }

            ensure_api_exec_container() {
              if api_exec true >/dev/null 2>&1; then
                return 0
              fi

              docker compose up -d --no-deps api >/dev/null 2>&1 || return 1

              for _ in $(seq 1 20); do
                if api_exec true >/dev/null 2>&1; then
                  return 0
                fi
                sleep 1
              done

              return 1
            }

            runtime_backup() {
              local reason="${1:-manual}"
              ensure_api_exec_container || return 1
              api_exec node scripts/exportRuntimeBackup.mjs "$reason"
            }

            runtime_restore() {
              local file_name="$1"
              ensure_api_exec_container || return 1
              api_exec node scripts/restoreRuntimeBackup.mjs "$file_name"
            }

            read_package_version() {
              sed -n 's/^[[:space:]]*"version":[[:space:]]*"\([^"]*\)".*/\1/p' package.json | head -n 1
            }

            export_build_env() {
              local build_ref="$1"
              local build_commit="$2"
              local build_time="$3"
              local build_version

              build_version="$(read_package_version)"
              export BUILD_VERSION="${build_version:-0.0.0}"
              export BUILD_REF="$build_ref"
              export BUILD_COMMIT="$build_commit"
              export BUILD_TIME="$build_time"
            }

            cleanup_worktree() {
              git clean -ffdx \
                -e .env \
                -e .env.local \
                -e apps/api/data/runtime/ \
                -e apps/api/data/runtime/** \
                >/dev/null 2>&1 || true
            }

            rollback() {
              trap - ERR
              set +e
              echo "[deploy] rollback to ${PREV_COMMIT}"
              cleanup_worktree
              git reset --hard "$PREV_COMMIT"
              export_build_env "$PREV_BUILD_REF" "$PREV_BUILD_COMMIT" "$PREV_BUILD_TIME"
              cleanup_compose_state
              if [ -n "$PREV_BACKUP_FILE" ] && [ -f scripts/restoreRuntimeBackup.mjs ]; then
                runtime_restore "$PREV_BACKUP_FILE" >/dev/null 2>&1 || true
                cleanup_compose_state
              fi
              docker compose up -d --build api miniapp
              wait_for_http http://127.0.0.1:3010 30 2 || true
            }

            trap rollback ERR
            if [ -f scripts/exportRuntimeBackup.mjs ]; then
              BACKUP_JSON="$(runtime_backup deploy-preflight 2>/dev/null || true)"
              PREV_BACKUP_FILE="$(printf '%s' "$BACKUP_JSON" | sed -n 's/.*"fileName": *"\([^"]*\)".*/\1/p' | head -n 1)"
            fi
            git fetch --tags origin
            TARGET_REF="${TARGET_REF:-origin/main}"
            TARGET_GIT_REF="$TARGET_REF"
            if git show-ref --verify --quiet "refs/remotes/origin/${TARGET_REF}"; then
              TARGET_GIT_REF="refs/remotes/origin/${TARGET_REF}"
            fi
            TARGET_COMMIT="$(git rev-parse "${TARGET_GIT_REF}^{commit}")"
            TARGET_BUILD_TIME="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            PREV_BUILD_TIME="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            cleanup_worktree
            git reset --hard "$TARGET_COMMIT"
            export_build_env "$TARGET_REF" "$TARGET_COMMIT" "$TARGET_BUILD_TIME"
            if [ -f docker-compose.yml ]; then
              cleanup_compose_state
              docker compose up -d --build api miniapp
              wait_for_http http://127.0.0.1:3010 30 2
              wait_for_http http://127.0.0.1:3010/api/runtime/health 30 2
              wait_for_http http://127.0.0.1:3010/api/runtime/version 30 2
              wait_for_http http://127.0.0.1:3010/api/prices 30 2
              wait_for_http "http://127.0.0.1:3010/api/markets?status=OPEN" 30 2
            fi
            trap - ERR
