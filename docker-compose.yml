services:
  miniapp:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3010:80"
    volumes:
      - ./apps/miniapp:/usr/share/nginx/html:ro
      - ./infra/nginx/miniapp.conf:/etc/nginx/conf.d/default.conf:ro

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s
    environment:
      BUILD_VERSION: ${BUILD_VERSION:-}
      BUILD_COMMIT: ${BUILD_COMMIT:-}
      BUILD_REF: ${BUILD_REF:-}
      BUILD_TIME: ${BUILD_TIME:-}
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    working_dir: /app
    command: ["node", "apps/api/src/index.js"]
    volumes:
      - ./apps/api/data/runtime:/app/apps/api/data/runtime
