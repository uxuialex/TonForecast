name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          envs: DEPLOY_PATH
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"
            PREV_COMMIT="$(git rev-parse HEAD)"

            rollback() {
              echo "[deploy] rollback to ${PREV_COMMIT}"
              git reset --hard "$PREV_COMMIT"
              docker rm -f $(docker ps -aq --filter "name=ton-forecast-api") 2>/dev/null || true
              docker compose up -d --build --force-recreate --no-deps api
              docker compose up -d --force-recreate --no-deps miniapp
            }

            trap rollback ERR
            git fetch origin main
            git reset --hard origin/main
            if [ -f docker-compose.yml ]; then
              docker rm -f $(docker ps -aq --filter "name=ton-forecast-api") 2>/dev/null || true
              docker compose up -d --build --force-recreate --no-deps api
              docker compose up -d --force-recreate --no-deps miniapp
              curl -fsS http://127.0.0.1:3010 >/dev/null
              curl -fsS http://127.0.0.1:3010/api/prices >/dev/null
              curl -fsS "http://127.0.0.1:3010/api/markets?status=OPEN" >/dev/null
            fi
            trap - ERR
