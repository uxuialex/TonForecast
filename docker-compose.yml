services:
  miniapp:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:3010:80"
    volumes:
      - ./apps/miniapp:/usr/share/nginx/html:ro
      - ./infra/nginx/miniapp.conf:/etc/nginx/conf.d/default.conf:ro

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    working_dir: /app
    command: ["node", "apps/api/src/index.js"]
    volumes:
      - ./:/app
      - /app/node_modules
      - ./apps/api/data/runtime:/app/apps/api/data/runtime
